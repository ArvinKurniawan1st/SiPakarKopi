<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sistem Pakar Diagnosis Penyakit Kopi{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --coffee-dark: #3B2314;
      --coffee-mid: #6B3E26;
      --coffee-light: #A0522D;
      --coffee-cream: #F5F0E8;
      --green-dark: #1B4332;
      --green-mid: #2D6A4F;
      --green-light: #52B788;
      --green-pale: #D8F3DC;
      --accent: #E9C46A;
    }

    body {
      background-color: #F8F9F4;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #2c3e50;
    }

    p,
    span,
    div {
      font-size: 1rem;
    }

    /* Navbar */
    .navbar-custom {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--coffee-dark) 100%);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      padding: 1rem 0;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff !important;
      letter-spacing: 0.3px;
    }

    .navbar-brand .brand-icon {
      font-size: 2rem;
      margin-right: 8px;
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.85) !important;
      font-weight: 500;
      font-size: 1.05rem;
      transition: color .2s;
      padding: 0.5rem 1rem !important;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--accent) !important;
    }

    /* Hero card */
    .hero-card {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 60%, var(--coffee-mid) 100%);
      color: white;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 4px 20px rgba(27, 67, 50, 0.25);
    }

    .hero-card h1 {
      font-weight: 700;
      font-size: 2.25rem;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .hero-card p {
      opacity: .95;
      font-size: 1.1rem;
      margin-bottom: 0;
      line-height: 1.8;
    }

    /* Cards */
    .card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: box-shadow .2s;
      overflow: hidden;
    }

    .card:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .card-header {
      background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
      color: white;
      border-radius: 14px 14px 0 0 !important;
      font-weight: 700;
      font-size: 1.15rem;
      padding: 1.25rem 1.5rem;
      border: none;
    }

    .card-header.coffee {
      background: linear-gradient(135deg, var(--coffee-mid), var(--coffee-dark));
    }

    .card-body {
      padding: 1.75rem;
    }

    /* Gejala checkbox items */
    .gejala-item {
      background: white;
      border: 2px solid #E0E8E3;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all .18s;
    }

    .gejala-item:hover {
      border-color: var(--green-light);
      background: #F5FBF8;
      box-shadow: 0 2px 8px rgba(82, 183, 136, 0.1);
    }

    .gejala-item.selected {
      border-color: var(--green-mid);
      background: var(--green-pale);
      box-shadow: 0 3px 12px rgba(45, 106, 79, 0.15);
    }

    .gejala-item input[type=checkbox] {
      accent-color: var(--green-mid);
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .gejala-item label {
      cursor: pointer;
      font-size: 1.05rem;
      margin: 0;
      flex: 1;
      padding-left: 0.75rem;
      font-weight: 500;
      color: #2c3e50;
    }

    /* CF Slider */
    .cf-slider-wrap {
      display: none;
      margin-top: 0.75rem;
      padding: 1rem 1rem 1.25rem;
      background: #F5FBF8;
      border-radius: 10px;
      border-left: 4px solid var(--green-mid);
    }

    .cf-slider-wrap.show {
      display: block;
    }

    .cf-slider {
      accent-color: var(--green-mid);
      width: 100%;
      height: 8px;
      cursor: pointer;
    }

    .cf-label {
      font-size: 0.95rem;
      color: var(--green-dark);
      font-weight: 700;
    }

    .cf-slider-wrap div:last-child {
      font-size: 0.95rem;
      color: #666;
      margin-top: 0.5rem;
    }

    /* Kategori badge */
    .badge-kategori {
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.4em 0.85em;
      border-radius: 20px;
      text-transform: capitalize;
      display: inline-block;
    }

    .kat-daun {
      background: #D8F3DC;
      color: #1B4332;
    }

    .kat-buah {
      background: #FDEBD0;
      color: #784212;
    }

    .kat-batang {
      background: #FADBD8;
      color: #78281F;
    }

    .kat-akar {
      background: #E8DAEF;
      color: #4A235A;
    }

    .kat-umum {
      background: #D6EAF8;
      color: #1B4F72;
    }

    /* Hasil diagnosis */
    .hasil-card {
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .hasil-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .hasil-header {
      padding: 1.5rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .hasil-header span:first-child {
      font-size: 1.3rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Warna hasil berdasarkan tingkat keyakinan CF dari engine */
    .hasil-header.bg-danger {
      background: linear-gradient(135deg, #DC3545, #C82333);
    }

    .hasil-header.bg-secondary {
      background: linear-gradient(135deg, #6C757D, #5A6268);
    }

    .hasil-header.bg-info {
      background: linear-gradient(135deg, #0DCAF0, #0BACDE);
    }

    .hasil-header.bg-warning {
      background: linear-gradient(135deg, #FFC107, #E0A800);
    }

    .hasil-header.bg-primary {
      background: linear-gradient(135deg, #198754, #146C43);
    }

    .cf-bar-wrap {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      height: 12px;
      min-width: 100px;
      flex: 0 0 100px;
    }

    .cf-bar {
      background: white;
      border-radius: 20px;
      height: 12px;
      transition: width 1s ease;
    }

    .hasil-body {
      background: white;
      padding: 1.75rem;
    }

    .hasil-body p {
      font-size: 1rem;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .hasil-body em {
      color: #666;
      font-size: 0.95rem;
    }

    .keyakinan-badge {
      display: inline-block;
      padding: 0.5em 1.2em;
      border-radius: 25px;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Btn */
    .btn-diagnosa {
      background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem 2rem;
      font-weight: 700;
      font-size: 1.15rem;
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
      transition: all .2s;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-diagnosa:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(45, 106, 79, 0.4);
      color: white;
    }

    .btn-diagnosa:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }

    .btn-reset {
      color: var(--green-dark);
      border-color: var(--green-dark);
      border-radius: 12px;
      border-width: 2px;
      font-weight: 600;
      font-size: 1.05rem;
      padding: 0.75rem 1.5rem;
    }

    .btn-sm {
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
    }

    /* Loader */
    #loading {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
    }

    #loading p {
      font-size: 1.1rem;
      color: #666;
    }

    .spinner-green {
      color: var(--green-mid);
    }

    .spinner-border {
      width: 3rem;
      height: 3rem;
    }

    /* Rumus CF box */
    .rumus-box {
      background: var(--green-pale);
      border-left: 5px solid var(--green-mid);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      line-height: 1.8;
      color: #1B4332;
      font-weight: 500;
    }

    footer {
      background: var(--coffee-dark);
      color: rgba(255, 255, 255, 0.8);
      padding: 2.5rem 0;
      margin-top: 4rem;
      font-size: 1rem;
    }

    footer p {
      font-size: 1rem;
    }

    footer strong {
      color: white;
      font-size: 1.1rem;
    }

    /* Badge counter */
    .badge {
      font-size: 0.95rem;
      padding: 0.5em 0.9em;
      font-weight: 600;
    }

    /* Info panel improvements */
    .alert {
      font-size: 1rem;
      padding: 1.25rem;
      border-radius: 10px;
    }

    .alert-success {
      background-color: #E8F8F5;
      border: 2px solid #52B788;
      color: #1B4332;
    }

    .alert-warning {
      background-color: #FEF5E7;
      border: 2px solid #F39C12;
      color: #78281F;
    }

    /* Table improvements */
    table {
      font-size: 1rem;
    }

    th {
      font-size: 1.05rem;
      font-weight: 700;
      padding: 1rem;
    }

    td {
      padding: 1rem;
      vertical-align: middle;
    }

    .table-bordered {
      border: 2px solid #ddd;
    }

    /* Details/Summary styling */
    details {
      margin-top: 1.25rem;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      color: var(--green-dark);
      font-size: 1.05rem;
      padding: 0.75rem;
      background: #f8fdf8;
      border-radius: 8px;
      transition: all 0.2s;
    }

    details summary:hover {
      background: var(--green-pale);
    }

    details[open] summary {
      margin-bottom: 0.5rem;
    }

    details .mt-2 {
      margin-top: 1rem;
      padding: 1rem;
      font-size: 1rem;
      line-height: 1.8;
    }

    /* Breadcrumb improvements */
    .breadcrumb {
      background-color: #f5f5f5;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1rem;
    }

    .breadcrumb-item {
      padding: 0.25rem 0;
    }

    .breadcrumb-item a {
      color: var(--green-mid);
      text-decoration: none;
      font-weight: 500;
    }

    .breadcrumb-item a:hover {
      text-decoration: underline;
    }

    /* Responsive improvements */
    @media (max-width: 768px) {
      .hero-card {
        padding: 2rem;
      }

      .hero-card h1 {
        font-size: 1.75rem;
      }

      .card-header {
        font-size: 1.05rem;
        padding: 1rem 1.25rem;
      }

      .btn-diagnosa {
        padding: 0.9rem 1.5rem;
        font-size: 1rem;
      }

      .navbar-brand {
        font-size: 1.25rem;
      }

      .nav-link {
        font-size: 1rem;
      }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-custom mb-0">
    <div class="container">
      <a class="navbar-brand" href="/">
        <span class="brand-icon">☕</span> SiPakar Kopi
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <i class="bi bi-list text-white fs-4"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/"><i
                class="bi bi-clipboard-pulse me-1"></i>Diagnosa</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'penyakit_list' %}active{% endif %}"
              href="/penyakit"><i class="bi bi-bug me-1"></i>Penyakit</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'tentang' %}active{% endif %}"
              href="/tentang"><i class="bi bi-info-circle me-1"></i>Tentang</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <div class="container text-center">
      <p class="mb-1"><strong style="color:white">SiPakar Kopi</strong></p>
      <small>&copy; 2023 D10. All rights reserved.</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>
